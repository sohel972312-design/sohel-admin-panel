name: Set ENV for Hostinger Deploy

on:
  push:
    branches: [main]

jobs:
  prepare-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create ENV_PRODUCTION_BASE64 secret value
        # This just validates the secret is set — actual encoding done below
        run: |
          if [ -z "${{ secrets.ENV_PRODUCTION_BASE64 }}" ]; then
            echo "⚠️  ENV_PRODUCTION_BASE64 secret is not set in GitHub!"
            echo "Go to: GitHub repo → Settings → Secrets → Actions → New secret"
            exit 1
          fi
          echo "✓ ENV_PRODUCTION_BASE64 is set"
